<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Recorded outcome class distribution</title>
  <desc id="desc">Horizontal bars show 382 class 0 participants and 831 class 1 participants, for 1,213 participants in total.</desc>
  <rect width="1200" height="440" fill="#ffffff"/>
  <text x="72" y="62" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Recorded outcome class distribution</text>
  <text x="72" y="94" fill="#586174" font-family="Arial, Helvetica, sans-serif" font-size="17">Complete labelled cohort · n = 1,213 · aggregate counts only</text>

  <g stroke="#d9dee8" stroke-width="1">
    <line x1="270" y1="132" x2="270" y2="340"/>
    <line x1="456" y1="132" x2="456" y2="340"/>
    <line x1="642" y1="132" x2="642" y2="340"/>
    <line x1="828" y1="132" x2="828" y2="340"/>
    <line x1="1014" y1="132" x2="1014" y2="340"/>
  </g>
  <g fill="#6b7280" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">
    <text x="270" y="365">0</text>
    <text x="456" y="365">200</text>
    <text x="642" y="365">400</text>
    <text x="828" y="365">600</text>
    <text x="1014" y="365">800</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="190" fill="#172033" font-size="20" font-weight="700">Class 0</text>
    <rect x="270" y="157" width="355" height="52" rx="6" fill="#b8d7ee" stroke="#245b85" stroke-width="2"/>
    <text x="641" y="190" fill="#172033" font-size="18" font-weight="700">382</text>
    <text x="702" y="190" fill="#586174" font-size="16">31.5%</text>

    <text x="72" y="283" fill="#172033" font-size="20" font-weight="700">Class 1</text>
    <rect x="270" y="250" width="773" height="52" rx="6" fill="#2f75a8" stroke="#174a70" stroke-width="2"/>
    <text x="1059" y="283" fill="#172033" font-size="18" font-weight="700">831</text>
    <text x="1120" y="283" fill="#586174" font-size="16">68.5%</text>
  </g>

  <text x="72" y="410" fill="#586174" font-family="Arial, Helvetica, sans-serif" font-size="15">Class 1 is the majority class; aggregate accuracy and positive-class F1 can obscure class-0 errors.</text>
</svg>
